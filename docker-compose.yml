version: '3.8'

services:

  # PostgreSQL
  postgres:
    image: postgres:15
    container_name: marcsbank-postgres
    environment:
      POSTGRES_USER: marcsbank
      POSTGRES_PASSWORD: marcsbank123
      POSTGRES_DB: marcsbank
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - marcsbank-network

  # MongoDB
  mongodb:
    image: mongo:6
    container_name: marcsbank-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: marcsbank
      MONGO_INITDB_ROOT_PASSWORD: marcsbank123
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - marcsbank-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: marcsbank-redis
    ports:
      - "6379:6379"
    networks:
      - marcsbank-network

  # Zookeeper (required for Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: marcsbank-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - marcsbank-network

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: marcsbank-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    networks:
      - marcsbank-network

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management
    container_name: marcsbank-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: marcsbank
      RABBITMQ_DEFAULT_PASS: marcsbank123
    networks:
      - marcsbank-network

volumes:
  postgres_data:
  mongo_data:

networks:
  marcsbank-network:
    driver: bridge
